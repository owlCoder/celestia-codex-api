<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestia Codex API Tester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 20px;
            background-color: #f8f9fa;
        }
        .token-section {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .card {
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }
        .card-header {
            background-color: #f1f3f5;
            font-weight: bold;
        }
        .response {
            background-color: #212529;
            color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .btn-sm {
            margin-right: 5px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .param-group {
            border-left: 2px solid #ced4da;
            padding-left: 15px;
            margin-bottom: 15px;
        }
        .param-group h6 {
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Celestia Codex API Tester</h1>

        <!-- Token Management -->
        <div class="token-section">
            <h5>Authentication</h5>
            <div class="row">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text">JWT Token</span>
                        <input type="text" class="form-control" id="tokenInput" placeholder="Paste your JWT token here">
                        <button class="btn btn-primary" id="setTokenBtn">Set Token</button>
                        <button class="btn btn-secondary" id="clearTokenBtn">Clear</button>
                    </div>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-info" data-bs-toggle="collapse" href="#loginFormCollapse" role="button" aria-expanded="false" aria-controls="loginFormCollapse">
                        Login (get token)
                    </button>
                </div>
            </div>
            <div class="collapse mt-3" id="loginFormCollapse">
                <div class="card card-body">
                    <h6>Login</h6>
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" class="form-control" id="loginUsername" placeholder="Username or Email" value="tester">
                        </div>
                        <div class="col-md-6">
                            <input type="password" class="form-control" id="loginPassword" placeholder="Password" value="Test1234">
                        </div>
                    </div>
                    <button class="btn btn-success mt-2" id="loginBtn">Login</button>
                </div>
            </div>
            <div id="tokenStatus" class="mt-2"></div>
        </div>

        <!-- Endpoint Cards will be injected here by JavaScript -->
        <div id="endpointsContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Base URL of the Celestia Codex API (adjust if different)
        const API_BASE = 'http://localhost:4000/api/v1';

        // Endpoint definitions
        const endpoints = [
            // Auth
            { method: 'POST', path: '/auth/register', description: 'Register new user', requiresAuth: false,
              fields: [
                  { name: 'username', type: 'text', default: 'newuser', required: true },
                  { name: 'fullName', type: 'text', default: 'New User', required: true },
                  { name: 'email', type: 'email', default: 'newuser@example.com', required: true },
                  { name: 'password', type: 'password', default: 'Password123', required: true },
                  { name: 'profilePicture', type: 'text', default: '', required: false }
              ] },
            { method: 'POST', path: '/auth/login', description: 'Login (returns token)', requiresAuth: false,
              fields: [
                  { name: 'usernameOrEmail', type: 'text', default: 'tester', required: true },
                  { name: 'password', type: 'password', default: 'Test1234', required: true }
              ] },
            { method: 'POST', path: '/auth/logout', description: 'Logout', requiresAuth: true,
              fields: [] },

            // Characters (public)
            { method: 'GET', path: '/characters', description: 'List all characters', requiresAuth: false,
              fields: [] },
            { method: 'GET', path: '/characters/{id}', description: 'Get character by ID', requiresAuth: false,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }] },
            { method: 'GET', path: '/characters/filter', description: 'Filter characters', requiresAuth: false,
              queryParams: [
                  { name: 'element', type: 'text', default: 'Pyro', required: false },
                  { name: 'weaponType', type: 'text', default: '', required: false },
                  { name: 'rarity', type: 'number', default: '', required: false }
              ] },
            // Characters (admin only)
            { method: 'POST', path: '/characters', description: 'Create character (admin)', requiresAuth: true,
              fields: [
                  { name: 'name', type: 'text', default: 'Test Hero', required: true },
                  { name: 'element', type: 'text', default: 'Pyro', required: true },
                  { name: 'weaponType', type: 'text', default: 'Sword', required: true },
                  { name: 'rarity', type: 'number', default: 5, required: true },
                  { name: 'region', type: 'text', default: 'Mondstadt', required: true },
                  { name: 'description', type: 'textarea', default: 'A test hero', required: true },
                  { name: 'image', type: 'text', default: 'data:image/png;base64,xxx', required: true }
              ] },
            { method: 'PUT', path: '/characters/{id}', description: 'Update character (admin)', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }],
              fields: [
                  { name: 'name', type: 'text', default: 'Updated Hero', required: false },
                  { name: 'element', type: 'text', default: '', required: false },
                  { name: 'weaponType', type: 'text', default: '', required: false },
                  { name: 'rarity', type: 'number', default: '', required: false },
                  { name: 'region', type: 'text', default: '', required: false },
                  { name: 'description', type: 'textarea', default: '', required: false },
                  { name: 'image', type: 'text', default: '', required: false }
              ] },
            { method: 'DELETE', path: '/characters/{id}', description: 'Delete character (admin)', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }] },

            // Collection
            { method: 'GET', path: '/collection', description: 'Get my collection', requiresAuth: true,
              fields: [] },
            { method: 'POST', path: '/collection', description: 'Add character to collection', requiresAuth: true,
              fields: [
                  { name: 'characterId', type: 'number', default: '1', required: true },
                  { name: 'level', type: 'number', default: 1, required: true },
                  { name: 'constellation', type: 'number', default: 0, required: true },
                  { name: 'weaponName', type: 'text', default: 'Iron Sword', required: true },
                  { name: 'refinement', type: 'number', default: 1, required: true }
              ] },
            { method: 'PUT', path: '/collection/{id}', description: 'Update collection item', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }],
              fields: [
                  { name: 'level', type: 'number', default: '', required: false },
                  { name: 'constellation', type: 'number', default: '', required: false },
                  { name: 'weaponName', type: 'text', default: '', required: false },
                  { name: 'refinement', type: 'number', default: '', required: false }
              ] },
            { method: 'DELETE', path: '/collection/{id}', description: 'Remove from collection', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }] },

            // Squads
            { method: 'GET', path: '/squads', description: 'Get my squads', requiresAuth: true,
              fields: [] },
            { method: 'POST', path: '/squads', description: 'Create squad', requiresAuth: true,
              fields: [{ name: 'name', type: 'text', default: 'My Squad', required: true }] },
            { method: 'GET', path: '/squads/{id}', description: 'Get squad by ID', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }] },
            { method: 'PUT', path: '/squads/{id}', description: 'Update squad name', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }],
              fields: [{ name: 'name', type: 'text', default: 'Updated Squad', required: true }] },
            { method: 'DELETE', path: '/squads/{id}', description: 'Delete squad', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }] },
            { method: 'POST', path: '/squads/{squadId}/members', description: 'Add member to squad', requiresAuth: true,
              pathParams: [{ name: 'squadId', type: 'number', default: '1', required: true }],
              fields: [{ name: 'userCharacterId', type: 'number', default: '1', required: true }] },
            { method: 'DELETE', path: '/squads/{squadId}/members/{memberId}', description: 'Remove member from squad', requiresAuth: true,
              pathParams: [
                  { name: 'squadId', type: 'number', default: '1', required: true },
                  { name: 'memberId', type: 'number', default: '1', required: true }
              ] },

            // Admin Users
            { method: 'GET', path: '/users', description: 'List all users (admin)', requiresAuth: true,
              fields: [] },
            { method: 'PUT', path: '/users/{id}/role', description: 'Change user role (admin)', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }],
              fields: [{ name: 'role', type: 'text', default: 'admin', required: true }] },
            { method: 'DELETE', path: '/users/{id}', description: 'Delete user (admin)', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }] },

            // Admin Audits
            { method: 'GET', path: '/audits/logs', description: 'Get all audit logs (admin)', requiresAuth: true,
              fields: [] },
            { method: 'GET', path: '/audits/logs/{id}', description: 'Get audit log by ID (admin)', requiresAuth: true,
              pathParams: [{ name: 'id', type: 'number', default: '1', required: true }] },
            { method: 'GET', path: '/audits/logs/user/{userId}', description: 'Get logs by user ID (admin)', requiresAuth: true,
              pathParams: [{ name: 'userId', type: 'number', default: '1', required: true }] }
        ];

        // Helper to build URL with path parameters
        function buildUrl(template, params) {
            let url = template;
            for (let key in params) {
                url = url.replace(`{${key}}`, params[key]);
            }
            return url;
        }

        // Store token in localStorage and update UI
        function setToken(token) {
            localStorage.setItem('jwt_token', token);
            document.getElementById('tokenInput').value = token;
            updateTokenStatus(true);
        }

        function clearToken() {
            localStorage.removeItem('jwt_token');
            document.getElementById('tokenInput').value = '';
            updateTokenStatus(false);
        }

        function updateTokenStatus(hasToken) {
            const statusDiv = document.getElementById('tokenStatus');
            if (hasToken) {
                statusDiv.innerHTML = '<div class="alert alert-success py-1 mb-0">Token set. Requests will include Authorization header.</div>';
            } else {
                statusDiv.innerHTML = '<div class="alert alert-secondary py-1 mb-0">No token set. Only public endpoints will work.</div>';
            }
        }

        // Function to send a request
        async function sendRequest(endpoint, values) {
            let url = API_BASE + endpoint.path;
            // Replace path parameters
            if (endpoint.pathParams) {
                for (let p of endpoint.pathParams) {
                    const val = values[p.name];
                    if (val) {
                        url = url.replace(`{${p.name}}`, encodeURIComponent(val));
                    } else {
                        alert(`Missing path parameter: ${p.name}`);
                        return;
                    }
                }
            }
            // Query parameters for GET requests
            let query = '';
            if (endpoint.method === 'GET' && endpoint.queryParams) {
                const queryParams = [];
                for (let p of endpoint.queryParams) {
                    const val = values[p.name];
                    if (val) {
                        queryParams.push(`${p.name}=${encodeURIComponent(val)}`);
                    }
                }
                if (queryParams.length) {
                    query = '?' + queryParams.join('&');
                }
            }
            url += query;

            const headers = {
                'Content-Type': 'application/json'
            };
            const token = localStorage.getItem('jwt_token');
            if (endpoint.requiresAuth && token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            let body = null;
            if (endpoint.method !== 'GET' && endpoint.fields && endpoint.fields.length) {
                // Build body object from fields
                const bodyObj = {};
                for (let f of endpoint.fields) {
                    const val = values[f.name];
                    if (val !== undefined && val !== '') {
                        bodyObj[f.name] = f.type === 'number' ? Number(val) : val;
                    } else if (f.required) {
                        alert(`Missing required field: ${f.name}`);
                        return;
                    }
                }
                body = JSON.stringify(bodyObj);
            }

            try {
                const response = await fetch(url, {
                    method: endpoint.method,
                    headers,
                    body: body
                });
                const responseData = await response.text();
                let pretty;
                try {
                    pretty = JSON.stringify(JSON.parse(responseData), null, 2);
                } catch(e) {
                    pretty = responseData;
                }
                return {
                    status: response.status,
                    statusText: response.statusText,
                    headers: response.headers,
                    data: pretty
                };
            } catch (error) {
                return {
                    status: 0,
                    statusText: 'Network Error',
                    headers: {},
                    data: error.message
                };
            }
        }

        // Build the UI dynamically
        function buildUI() {
            const container = document.getElementById('endpointsContainer');
            container.innerHTML = '';
            endpoints.forEach((ep, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${idx}`;
                const header = document.createElement('div');
                header.className = 'card-header';
                header.innerHTML = `<span class="badge bg-${ep.method === 'GET' ? 'success' : (ep.method === 'POST' ? 'primary' : (ep.method === 'PUT' ? 'warning' : 'danger'))} me-2">${ep.method}</span> ${ep.path} <small class="text-muted">${ep.description}</small>`;
                card.appendChild(header);
                const bodyDiv = document.createElement('div');
                bodyDiv.className = 'card-body';

                // Form group for fields (request body)
                if (ep.fields && ep.fields.length) {
                    const fieldsDiv = document.createElement('div');
                    fieldsDiv.className = 'param-group';
                    fieldsDiv.innerHTML = '<h6>Request Body (JSON)</h6>';
                    for (let f of ep.fields) {
                        const inputType = f.type === 'textarea' ? 'textarea' : 'input';
                        const input = document.createElement(inputType);
                        input.className = 'form-control mb-2';
                        input.placeholder = f.name + (f.required ? ' (required)' : '');
                        input.name = f.name;
                        if (f.type === 'textarea') {
                            input.rows = 2;
                        } else {
                            input.type = f.type === 'number' ? 'number' : (f.type === 'password' ? 'password' : 'text');
                        }
                        input.value = f.default !== undefined ? f.default : '';
                        const label = document.createElement('label');
                        label.innerText = f.name + (f.required ? ' *' : '');
                        label.className = 'form-label mt-2';
                        fieldsDiv.appendChild(label);
                        fieldsDiv.appendChild(input);
                    }
                    bodyDiv.appendChild(fieldsDiv);
                }

                // Path parameters
                if (ep.pathParams && ep.pathParams.length) {
                    const pathDiv = document.createElement('div');
                    pathDiv.className = 'param-group';
                    pathDiv.innerHTML = '<h6>Path Parameters</h6>';
                    for (let p of ep.pathParams) {
                        const input = document.createElement('input');
                        input.type = p.type === 'number' ? 'number' : 'text';
                        input.className = 'form-control mb-2';
                        input.placeholder = p.name + (p.required ? ' (required)' : '');
                        input.name = p.name;
                        input.value = p.default !== undefined ? p.default : '';
                        const label = document.createElement('label');
                        label.innerText = p.name + (p.required ? ' *' : '');
                        label.className = 'form-label mt-2';
                        pathDiv.appendChild(label);
                        pathDiv.appendChild(input);
                    }
                    bodyDiv.appendChild(pathDiv);
                }

                // Query parameters (only for GET)
                if (ep.method === 'GET' && ep.queryParams && ep.queryParams.length) {
                    const queryDiv = document.createElement('div');
                    queryDiv.className = 'param-group';
                    queryDiv.innerHTML = '<h6>Query Parameters</h6>';
                    for (let q of ep.queryParams) {
                        const input = document.createElement('input');
                        input.type = q.type === 'number' ? 'number' : 'text';
                        input.className = 'form-control mb-2';
                        input.placeholder = q.name + (q.required ? ' (required)' : '');
                        input.name = q.name;
                        input.value = q.default !== undefined ? q.default : '';
                        const label = document.createElement('label');
                        label.innerText = q.name;
                        label.className = 'form-label mt-2';
                        queryDiv.appendChild(label);
                        queryDiv.appendChild(input);
                    }
                    bodyDiv.appendChild(queryDiv);
                }

                // Buttons
                const btnDiv = document.createElement('div');
                btnDiv.className = 'mt-3';
                const sendBtn = document.createElement('button');
                sendBtn.className = 'btn btn-primary btn-sm';
                sendBtn.innerText = 'Send Request';
                const clearBtn = document.createElement('button');
                clearBtn.className = 'btn btn-secondary btn-sm';
                clearBtn.innerText = 'Clear Response';
                btnDiv.appendChild(sendBtn);
                btnDiv.appendChild(clearBtn);
                bodyDiv.appendChild(btnDiv);

                // Response area
                const responseDiv = document.createElement('div');
                responseDiv.className = 'mt-3';
                responseDiv.innerHTML = '<h6>Response</h6><div class="response" id="response-' + idx + '">(no request sent)</div>';
                bodyDiv.appendChild(responseDiv);
                card.appendChild(bodyDiv);
                container.appendChild(card);

                // Attach event listeners
                sendBtn.addEventListener('click', async () => {
                    // Collect values from all inputs inside this card
                    const inputs = card.querySelectorAll('input, textarea');
                    const values = {};
                    for (let inp of inputs) {
                        if (inp.name) {
                            values[inp.name] = inp.value;
                        }
                    }
                    const result = await sendRequest(ep, values);
                    const responseContainer = document.getElementById(`response-${idx}`);
                    responseContainer.innerHTML = `
                        <strong>Status:</strong> ${result.status} ${result.statusText}<br>
                        <strong>Response:</strong><br>
                        ${result.data}
                    `;
                });
                clearBtn.addEventListener('click', () => {
                    const responseContainer = document.getElementById(`response-${idx}`);
                    responseContainer.innerHTML = '(no request sent)';
                });
            });
        }

        // Login function
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const url = API_BASE + '/auth/login';
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernameOrEmail: username, password: password })
                });
                const data = await resp.json();
                if (resp.status === 200 && data.success) {
                    const token = data.data.token;
                    setToken(token);
                    alert('Login successful, token set');
                } else {
                    alert('Login failed: ' + (data.message || 'Unknown error'));
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            }
        }

        // Initialization
        window.onload = () => {
            buildUI();
            const savedToken = localStorage.getItem('jwt_token');
            if (savedToken) {
                setToken(savedToken);
            } else {
                updateTokenStatus(false);
            }
            document.getElementById('setTokenBtn').addEventListener('click', () => {
                const token = document.getElementById('tokenInput').value.trim();
                if (token) setToken(token);
                else alert('Enter a token');
            });
            document.getElementById('clearTokenBtn').addEventListener('click', clearToken);
            document.getElementById('loginBtn').addEventListener('click', login);
        };
    </script>
</body>
</html>
